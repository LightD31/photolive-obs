name: photolive
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
section: default
priority: optional
maintainer: Photolive Maintainers <noreply@example.com>
description: |
  Photolive — photo slideshow server with OBS integration.
  Bundles the Fastify backend together with the web-control operator UI
  and the web-slideshow audience-facing page.
vendor: Photolive
homepage: https://github.com/LightD31/photolive-obs
license: MIT

contents:
  - src: ./staging
    dst: /opt/photolive
    type: tree

  - src: /opt/photolive/photolive
    dst: /usr/bin/photolive
    type: symlink

overrides:
  rpm:
    depends:
      - glibc
      - libstdc++

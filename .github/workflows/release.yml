name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # pkg's static tracer cannot follow pnpm's symlinked node_modules,
  # so force a hoisted layout for release builds only.
  NPM_CONFIG_NODE_LINKER: hoisted

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web apps
        run: pnpm --filter @photolive/web-control --filter @photolive/web-slideshow run build

      - name: Bundle server with esbuild
        shell: bash
        run: |
          pnpm dlx esbuild apps/server/src/main.ts \
            --bundle --platform=node --format=esm --target=node22 \
            --packages=external \
            --alias:@photolive/shared=./packages/shared/src/index.ts \
            --outfile=apps/server/dist/main.js

      - name: Install @yao-pkg/pkg
        run: pnpm add -g @yao-pkg/pkg@^6

      - name: Build Windows executable
        shell: bash
        run: |
          mkdir -p packaging/staging
          pkg pkg.config.json \
            --targets node22-win-x64 \
            --output packaging/staging/photolive.exe \
            --compress GZip
          ls -la packaging/staging/

      - name: Stage extra files
        shell: bash
        run: |
          cp packaging/photolive.env.example packaging/staging/.env.example
          cat > packaging/staging/README.txt <<'EOF'
          Photolive — portable Windows build
          ===================================

          1. Copy .env.example to .env and fill in PHOTOLIVE_AUTH_TOKEN.
          2. Open a terminal in this folder and run: photolive.exe
          3. Open a browser at http://localhost:3001 (slideshow) or
             http://localhost:3001/control (operator UI).

          Data (sqlite db, photos, renditions) is stored under ./data/
          relative to wherever you launched the executable from.
          EOF

      - name: Zip the staging folder
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "photolive-$version-windows-x64.zip"
          Compress-Archive -Path packaging/staging/* -DestinationPath $zipName
          Get-ChildItem $zipName

      - uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: photolive-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web apps
        run: pnpm --filter @photolive/web-control --filter @photolive/web-slideshow run build

      - name: Bundle server with esbuild
        shell: bash
        run: |
          pnpm dlx esbuild apps/server/src/main.ts \
            --bundle --platform=node --format=esm --target=node22 \
            --packages=external \
            --alias:@photolive/shared=./packages/shared/src/index.ts \
            --outfile=apps/server/dist/main.js

      - name: Install @yao-pkg/pkg
        run: pnpm add -g @yao-pkg/pkg@^6

      - name: Build Linux executable
        run: |
          mkdir -p packaging/staging
          pkg pkg.config.json \
            --targets node22-linux-x64 \
            --output packaging/staging/photolive \
            --compress GZip
          chmod +x packaging/staging/photolive
          ls -la packaging/staging/

      - name: Stage extra files
        run: |
          cp packaging/photolive.env.example packaging/staging/photolive.env.example

      - name: Install nfpm
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build RPM
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading "v" from tag for semver-clean version.
          export VERSION="${VERSION#v}"
          cd packaging
          nfpm package --config nfpm.yaml --packager rpm --target ../
          ls -la ../*.rpm

      - uses: actions/upload-artifact@v5
        with:
          name: linux-rpm
          path: '*.rpm'
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.rpm
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

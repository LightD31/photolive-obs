name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  NODE_VERSION: v22.11.0

jobs:
  build-windows:
    name: Build Windows .zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web apps
        run: pnpm --filter @photolive/web-control --filter @photolive/web-slideshow run build

      - name: Bundle server with esbuild (deps external)
        shell: bash
        env:
          BANNER: "import {createRequire as __cr} from 'node:module';const require=__cr(import.meta.url);"
        run: |
          mkdir -p packaging/staging
          for entry in apps/server/src/main.ts apps/server/src/workers/ingest.worker.ts; do
            out=packaging/staging/$(basename "$entry" .ts).js
            pnpm dlx esbuild "$entry" \
              --bundle --platform=node --format=esm --target=node22 \
              --packages=external \
              --alias:@photolive/shared=./packages/shared/src/index.ts \
              --banner:js="$BANNER" \
              --outfile="$out"
          done
          cp -r apps/server/drizzle packaging/staging/drizzle

      - name: Materialise prod node_modules (pnpm deploy)
        shell: bash
        run: |
          pnpm --filter @photolive/server deploy --prod ${{ runner.temp }}/server-deploy
          # Take only node_modules + package.json; the bundle replaces the source.
          cp -RL ${{ runner.temp }}/server-deploy/node_modules packaging/staging/node_modules
          cp ${{ runner.temp }}/server-deploy/package.json packaging/staging/package.json

      - name: Stage Node runtime
        shell: bash
        run: |
          curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-win-x64.zip" -o ${{ runner.temp }}/node.zip
          unzip -q ${{ runner.temp }}/node.zip -d ${{ runner.temp }}/
          cp "${{ runner.temp }}/node-${NODE_VERSION}-win-x64/node.exe" packaging/staging/node.exe

      - name: Stage launcher and config
        shell: bash
        run: |
          cp packaging/photolive.env.example packaging/staging/.env.example
          cat > packaging/staging/photolive.bat <<'BAT'
          @echo off
          setlocal
          set "DIR=%~dp0"
          "%DIR%node.exe" "%DIR%main.js" %*
          BAT
          cat > packaging/staging/README.txt <<'EOF'
          Photolive — Windows portable build
          ==================================
          1. Copy .env.example to .env and set PHOTOLIVE_AUTH_TOKEN.
          2. Double-click photolive.bat (or run it from a terminal).
          3. Open http://localhost:3001/control in your browser.

          Data lives under ./data/ next to photolive.bat.
          EOF

      - name: Zip the staging folder
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "photolive-$version-windows-x64.zip"
          Compress-Archive -Path packaging/staging/* -DestinationPath $zipName
          Get-ChildItem $zipName

      - uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: photolive-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web apps
        run: pnpm --filter @photolive/web-control --filter @photolive/web-slideshow run build

      - name: Bundle server with esbuild (deps external)
        env:
          BANNER: "import {createRequire as __cr} from 'node:module';const require=__cr(import.meta.url);"
        run: |
          mkdir -p packaging/staging
          for entry in apps/server/src/main.ts apps/server/src/workers/ingest.worker.ts; do
            out=packaging/staging/$(basename "$entry" .ts).js
            pnpm dlx esbuild "$entry" \
              --bundle --platform=node --format=esm --target=node22 \
              --packages=external \
              --alias:@photolive/shared=./packages/shared/src/index.ts \
              --banner:js="$BANNER" \
              --outfile="$out"
          done
          cp -r apps/server/drizzle packaging/staging/drizzle

      - name: Materialise prod node_modules (pnpm deploy)
        run: |
          pnpm --filter @photolive/server deploy --prod ${{ runner.temp }}/server-deploy
          cp -RL ${{ runner.temp }}/server-deploy/node_modules packaging/staging/node_modules
          cp ${{ runner.temp }}/server-deploy/package.json packaging/staging/package.json

      - name: Stage Node runtime
        run: |
          curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-x64.tar.xz" -o ${{ runner.temp }}/node.tar.xz
          tar -xJf ${{ runner.temp }}/node.tar.xz -C ${{ runner.temp }}
          cp "${{ runner.temp }}/node-${NODE_VERSION}-linux-x64/bin/node" packaging/staging/node
          chmod +x packaging/staging/node

      - name: Stage entrypoint script
        run: |
          cat > packaging/staging/photolive <<'EOF'
          #!/bin/bash
          DIR="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" &> /dev/null && pwd)"
          exec "$DIR/node" "$DIR/main.js" "$@"
          EOF
          chmod +x packaging/staging/photolive

      - name: Install nfpm
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build RPM
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          cd packaging
          nfpm package --config nfpm.yaml --packager rpm --target ../
          ls -la ../*.rpm

      - uses: actions/upload-artifact@v5
        with:
          name: linux-rpm
          path: '*.rpm'
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.rpm
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Use pnpm's default isolated linker. electron-builder needs `electron`
# in apps/desktop/node_modules to compute the runtime version, and stage.cjs
# needs apps/desktop/node_modules/.bin/electron-rebuild — both broken under
# the hoisted layout we used for the old esbuild + nfpm pipeline.

jobs:
  build-desktop-windows:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web bundles, shared, server, desktop
        run: pnpm --filter @photolive/desktop build:all

      - name: Package Windows (NSIS + portable zip)
        env:
          # electron-builder uploads draft releases on its own when GH_TOKEN
          # is set; we publish via softprops/action-gh-release in a later job
          # to keep all artifacts together.
          GH_TOKEN: ''
        run: pnpm --filter @photolive/desktop package:win

      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
          if-no-files-found: error

  build-desktop-linux:
    name: Build Linux artifacts
    # ubuntu-22.04 keeps glibc baseline compatible with older RHEL/CentOS hosts;
    # AppImages built on ubuntu-latest can fail to launch on those.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install OS deps for AppImage / RPM / DEB
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfuse2 rpm dpkg

      - name: Install dependencies (hoisted)
        run: pnpm install --frozen-lockfile

      - name: Build web bundles, shared, server, desktop
        run: pnpm --filter @photolive/desktop build:all

      - name: Package Linux (AppImage + RPM + DEB)
        env:
          GH_TOKEN: ''
        run: pnpm --filter @photolive/desktop package:linux

      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.rpm
            apps/desktop/release/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-desktop-windows, build-desktop-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.AppImage
            dist/*.rpm
            dist/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

appId: io.photolive.app
productName: Photolive
copyright: © Photolive contributors

directories:
  output: release
  buildResources: resources

# Asar holds only the desktop's compiled main + preload — small, fast to load.
files:
  - dist/**/*
  - package.json
  - '!**/data/**'
  - '!**/*.sqlite'
  - '!**/*.sqlite-shm'
  - '!**/*.sqlite-wal'
  - '!**/*.ts'
  - '!**/*.ts.map'
  - '!**/*.tsbuildinfo'
  - '!**/tsconfig*.json'
  - '!**/tests/**'
  - '!**/__tests__/**'
  - '!**/*.test.*'

# Everything that needs to live on disk (outside the asar) ships as
# extraResources. The Node native modules under server-runtime/node_modules
# can't go inside an asar (dlopen needs real filesystem paths), and the web
# bundles need to be readable by `@fastify/static` which uses normal fs calls.
#
# Layout under <app>/resources/:
#   server-runtime/dist/app.js           server's compiled JS, loaded by main
#   server-runtime/node_modules/...      prod deps (better-sqlite3, sharp, ...)
#   server-runtime/drizzle/              SQL migrations
#   apps/web-control/dist/               operator UI bundle
#   apps/web-slideshow/dist/             slideshow bundle (OBS browser source)
extraResources:
  - from: server-runtime
    to: server-runtime
  - from: ../web-control/dist
    to: apps/web-control/dist
  - from: ../web-slideshow/dist
    to: apps/web-slideshow/dist

# Native modules already rebuilt by scripts/stage.cjs. We don't ask
# electron-builder to do it again.
npmRebuild: false
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: resources/icon.ico
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false # writable install dir → "next-to-exe" data dir works
  shortcutName: Photolive
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
    - rpm
    - deb
  category: AudioVideo
  icon: resources/icon.png
  maintainer: Photolive contributors <noreply@photolive.invalid>
  vendor: Photolive
  synopsis: Live event photography slideshow with OBS integration
  description: |
    Photolive ingests JPEGs from photographers' cameras (FTP), generates
    display + thumbnail renditions, and broadcasts them to a slideshow
    page consumable by OBS as a browser source.
  desktop:
    Name: Photolive
    Comment: Live photo slideshow with OBS integration
    Categories: AudioVideo;Photography;
  artifactName: ${productName}-${version}-${arch}.${ext}

forceCodeSigning: false
